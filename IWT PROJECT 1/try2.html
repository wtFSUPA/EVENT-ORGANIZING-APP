    <title>Document</title>
</head>
<body>
    <script>
        var a=10;
        var b=20;
        var c="test";
        var linebrake="<br>";

        document.write("a+b=")
        result=a+b;
        document.write(result);
        document.write(linebrake);

        document.write("a-b=")
        result=a-b;
        document.write(result);
        document.write(linebrake);

        document.write("a*b=")
        result=a*b;
        document.write(result);
        document.write(linebrake);

        document.write("a%b=")
        result=a%b;
        document.write(result);
        document.write(linebrake);
        
    </script>
